config:
  runTime: "dockerCompose"
  version: ""
  framework: "dockerCompose"
  installCommand: ""
  buildCommand: "docker-compose build"
  buildDir: "/"
  runCommand: "docker-compose up -d"
  isMonoRepoPackageInRoot: true/false 
environments:
  - key: "DB_USER"
    value: "cyclos"
  - key: "DB_PASS"
    value: "cyclos"
  - key: "DB_NAME"
    value: "cyclos"
 ports:
  - protocol: "HTTPS"
    targetProtocol: "HTTP"
    listeningPort: "443"
    targetPort: "8080"
    targetIP: "172.17.0.1"
    public: true
    path: "/"
    isAuth: false
  
webUI:
  - url: "https://[CI_CD_DOMAIN]"
    label: "Redis Insight Web UI"
    login: "[ADMIN_EMAIL]"
    password: "[ADMIN_PASSWORD]"
monoRepoWorkSpaces: []